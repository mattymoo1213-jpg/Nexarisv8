<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#111;
padding:10px;
box-sizing:border-box;
overflow-y:auto;
transition:transform .3s ease;
z-index:20;
}

#sidebar.hidden{
transform:translateX(-100%);
}

/* MAIN */
#main{
position:absolute;
left:260px;
right:0;
top:0;
bottom:0;
display:flex;
flex-direction:column;
transition:left .3s ease;
}

#main.full{
left:0;
}

/* TOGGLE */
#toggleBtn{
position:fixed;
top:10px;
left:270px;
z-index:999;
background:white;
color:black;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* BUTTONS */
.sideBtn{
width:100%;
margin-top:8px;
padding:10px;
background:#222;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* SEARCH */
#search{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
color:white;
border:1px solid #333;
box-sizing:border-box;
}

/* CHAT LIST */
.chatItem{
background:#1b1b1b;
padding:8px;
margin-top:6px;
border-radius:6px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
}

.chatItem:hover{
background:#2b2b2b;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:3px 6px;
border-radius:4px;
cursor:pointer;
font-size:12px;
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

/* USER */
.user{
align-self:flex-end;
background:#444;
padding:10px;
border-radius:14px;
max-width:75%;
word-wrap:break-word;
}

/* AI */
.ai{
align-self:flex-start;
white-space:pre-wrap;
max-width:100%;
word-wrap:break-word;
}

/* INPUT */
#inputArea{
display:flex;
gap:8px;
padding:10px;
border-top:1px solid #333;
}

#plusBtn{
width:45px;
height:45px;
border-radius:50%;
background:#222;
color:white;
border:none;
font-size:26px;
cursor:pointer;
}

#input{
flex:1;
padding:12px;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
}

#sendBtn{
padding:12px;
background:white;
color:black;
border:none;
border-radius:10px;
cursor:pointer;
}

#sendBtn:disabled{
opacity:0.5;
}
</style>
</head>

<body>

<div id="sidebar">
<button class="sideBtn" id="newChatBtn">+ New Chat</button>
<button class="sideBtn" id="modeBtn">Smart Mode 🧠</button>
<input id="search" placeholder="Search chats...">
<div id="chatList"></div>
</div>

<button id="toggleBtn">◀</button>

<div id="main">

<div id="chat"></div>

<div id="inputArea">
<button id="plusBtn">＋</button>
<input id="imgInput" type="file" accept="image/*" hidden>
<input id="input" placeholder="Message Nexaris...">
<button id="sendBtn">Send</button>
</div>

</div>

<script>

/* =========================
   SAFETY DEBUG
========================= */
window.onerror = (m)=>console.log("JS ERROR:",m);

/* =========================
   STORAGE
========================= */
let chats = JSON.parse(localStorage.getItem("nexaris_chats")||"{}");
let currentChat = localStorage.getItem("nexaris_current");

if(Object.keys(chats).length===0){
chats["New Chat"]={messages:[],pinned:false};
currentChat="New Chat";
}

/* =========================
   MODE
========================= */
let mode="smart";
let lastImageBase64=null;

/* =========================
   API KEYS
========================= */
const GROQ_KEY="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";
const OPENROUTER_KEY="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";
const GEMINI_KEY="AQ.Ab8RN6Li8Xq67CHOV7aDzAY2UPDdVWO7S3EatwcLpp_SwNqRvQ";

/* =========================
   ELEMENTS
========================= */
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const sendBtn=document.getElementById("sendBtn");
const sidebar=document.getElementById("sidebar");
const main=document.getElementById("main");
const chatList=document.getElementById("chatList");

/* =========================
   SAVE
========================= */
function save(){
localStorage.setItem("nexaris_chats",JSON.stringify(chats));
localStorage.setItem("nexaris_current",currentChat);
}

/* =========================
   AI LAYERS
========================= */
async function groq(messages){
try{
let r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages
})
});
let d=await r.json();
return d?.choices?.[0]?.message?.content||null;
}catch{return null;}
}

async function openrouter(messages){
try{
let r=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENROUTER_KEY
},
body:JSON.stringify({
model:"meta-llama/llama-3.1-8b-instruct",
messages
})
});
let d=await r.json();
return d?.choices?.[0]?.message?.content||null;
}catch{return null;}
}

async function gemini(messages){
try{
let r=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:messages.map(m=>({
role:m.role==="user"?"user":"model",
parts:[{text:m.content}]
}))
})
}
);
let d=await r.json();
return d?.candidates?.[0]?.content?.parts?.[0]?.text||null;
}catch{return null;}
}

/* =========================
   FALLBACK ENGINE
========================= */
async function askAI(messages){

let r=await groq(messages);
if(r) return {text:r,source:"Groq"};

r=await openrouter(messages);
if(r) return {text:r,source:"OpenRouter"};

r=await gemini(messages);
if(r) return {text:r,source:"Gemini"};

return {text:"All AI failed.",source:"Error"};

}

/* =========================
   RENDER
========================= */
function render(){
chat.innerHTML="";
for(let m of chats[currentChat].messages){
let d=document.createElement("div");
d.className=m.role==="user"?"user":"ai";
d.textContent=m.content;
chat.appendChild(d);
}
chat.scrollTop=chat.scrollHeight;
}

/* =========================
   CHAT LIST
========================= */
function renderList(){
chatList.innerHTML="";
Object.keys(chats).forEach(n=>{
let div=document.createElement("div");
div.className="chatItem";
div.textContent=n;

div.onclick=()=>{
currentChat=n;
save();
render();
};

let del=document.createElement("button");
del.textContent="X";
del.className="deleteBtn";

del.onclick=(e)=>{
e.stopPropagation();
delete chats[n];
currentChat=Object.keys(chats)[0];
save();
render();
};

div.appendChild(del);
chatList.appendChild(div);
});
}

/* =========================
   SEND (SAFE)
========================= */
async function send(){

let text=input.value.trim();
if(!text && !lastImageBase64) return;

sendBtn.disabled=true;
input.value="";

chats[currentChat].messages.push({role:"user",content:text});
render();
save();

chats[currentChat].messages.push({
role:"assistant",
content:"Thinking..."
});
render();

let messages=[
{role:"system",content:"You are Nexaris."},
...chats[currentChat].messages
];

let res=await askAI(messages);

chats[currentChat].messages.pop();

chats[currentChat].messages.push({
role:"assistant",
content:"🧠 "+res.source+"\n\n"+res.text
});

save();
render();

sendBtn.disabled=false;
}

/* =========================
   EVENTS
========================= */
document.getElementById("sendBtn").onclick=send;

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter")send();
});

render();
renderList();

</script>

</body>
</html>
