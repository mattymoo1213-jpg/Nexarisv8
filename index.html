<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
height:100vh;
overflow:hidden;
display:flex;
}

/* SIDEBAR */
#sidebar{
width:260px;
background:#111;
padding:10px;
box-sizing:border-box;
display:flex;
flex-direction:column;
}

#chatList{
flex:1;
overflow-y:auto;
margin-top:10px;
}

.chatItem{
padding:8px;
background:#1b1b1b;
margin-bottom:6px;
border-radius:6px;
cursor:pointer;
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT AREA */
#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.user{
align-self:flex-end;
background:#444;
padding:10px;
border-radius:14px;
max-width:75%;
}

.ai{
align-self:flex-start;
padding:10px;
white-space:pre-wrap;
max-width:100%;
}

/* INPUT */
#inputArea{
display:flex;
padding:10px;
border-top:1px solid #333;
gap:8px;
}

#input{
flex:1;
padding:12px;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
}

button{
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* HEADER */
#topBar{
padding:10px;
border-bottom:1px solid #222;
font-size:18px;
}

</style>
</head>

<body>

<div id="sidebar">
<div style="font-size:18px;">💬 Nexaris</div>
<div id="chatList"></div>
</div>

<div id="main">

<div id="topBar">Clean Mode 🤖</div>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Message Nexaris...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

/* 🔑 API KEYS */
const GEMINI_KEY = "curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent" \
  -H 'Content-Type: application/json' \
  -H 'X-goog-api-key: AQ.Ab8RN6Iuxe2-qJcDpPDv3APqjTdWF5f3LZALfV7SDien_LPlJQ' \
  -X POST \
  -d '{
    "contents": [
      {
        "parts": [
          {
            "text": "Explain how AI works in a few words"
          }
        ]
      }
    ]
  }'";
const OPENROUTER_KEY = "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";

/* 💬 MEMORY */
let messages = [];

/* 🧠 GEMINI */
async function askGemini(msgs){
try{
const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents: msgs.map(m=>({
role: m.role==="user"?"user":"model",
parts:[{text:m.content}]
}))
})
}
);

const data = await res.json();
return data?.candidates?.[0]?.content?.parts?.[0]?.text;
}catch(e){
return null;
}
}

/* 🌐 OPENROUTER */
async function askOpenRouter(msgs){
try{
const res = await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",
headers:{
"Authorization":"Bearer " + OPENROUTER_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"meta-llama/llama-3.1-8b-instruct",
messages:msgs
})
}
);

const data = await res.json();
return data?.choices?.[0]?.message?.content;
}catch(e){
return null;
}
}

/* 🤖 ROUTER */
async function getAI(){

let r = await askGemini(messages);
if(r) return "🧠 Gemini:\n" + r;

r = await askOpenRouter(messages);
if(r) return "🌐 OpenRouter:\n" + r;

return "⚠️ Both AI systems failed.";
}

/* 💬 SEND */
async function send(){

const input = document.getElementById("input");
const text = input.value.trim();
if(!text) return;

input.value="";

messages.push({role:"user",content:text});

render();

messages.push({role:"assistant",content:"Thinking..."});
render();

const reply = await getAI();

messages[messages.length-1].content = reply;

render();
}

/* 🖥️ RENDER */
function render(){

const chat = document.getElementById("chat");
chat.innerHTML="";

for(const m of messages){
const div=document.createElement("div");
div.className = m.role==="user"?"user":"ai";
div.textContent=m.content;
chat.appendChild(div);
}

chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
