<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris Chat</title>
</head>

<body style="background:black;color:#00ffcc;font-family:Arial;display:flex;flex-direction:column;height:100vh;margin:0;">

<!-- CHAT AREA -->
<div id="chat" style="flex:1;overflow-y:auto;padding:10px;"></div>

<!-- INPUT AREA -->
<div style="display:flex;padding:10px;gap:10px;">
  <input id="input" placeholder="Type..." style="flex:1;padding:10px;">
  <button onclick="send()" style="padding:10px;">Send</button>
</div>

<script>

const API_KEY = "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";

const chat = document.getElementById("chat");

let messages = [
  {
    role: "system",
    content: "You are Nexaris, a helpful AI assistant."
  }
];

// 🧠 add message to UI
function addMessage(role, text) {
  const div = document.createElement("div");
  div.style.margin = "10px 0";
  div.style.whiteSpace = "pre-wrap";

  div.innerHTML =
    role === "user"
      ? "🧑 You: " + text
      : "🤖 AI: " + text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  input.value = "";

  addMessage("user", text);

  messages.push({ role: "user", content: text });

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: "llama-3.1-8b-instant",
      messages: messages
    })
  });

  const data = await res.json();

  const reply =
    data?.choices?.[0]?.message?.content ||
    "Error getting response";

  messages.push({ role: "assistant", content: reply });

  addMessage("assistant", reply);
}

</script>

</body>
</html>
