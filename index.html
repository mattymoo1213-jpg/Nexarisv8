<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial;
  background: black;
  color: white;
  overflow: hidden;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 200px;
  height: 100%;
  background: #111;
  padding: 10px;
  overflow-y: auto;
  transform: translateX(0);
  transition: transform 0.3s ease;
}
#sidebar.hidden {
  transform: translateX(-100%);
}

/* TOGGLE BUTTON */
#toggleBtn {
  position: fixed;
  top: 10px;
  left: 210px;
  background: white;
  color: black;
  padding: 5px 8px;
  cursor: pointer;
  border-radius: 5px;
  z-index: 10;
  transition: left 0.3s ease;
}
#toggleBtn.shifted {
  left: 10px;
}

/* MAIN */
#main {
  position: absolute;
  left: 200px;
  right: 0;
  top: 0;
  bottom: 0;
  display: flex;
  flex-direction: column;
  transition: left 0.3s ease;
}
#main.full {
  left: 0;
}

/* CHAT LIST */
.chat-tab {
  padding: 10px;
  margin-bottom: 5px;
  background: #222;
  border-radius: 5px;
  cursor: pointer;
}
.chat-tab.active {
  background: white;
  color: black;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* USER */
.user {
  align-self: flex-end;
  background: #444;
  padding: 10px 14px;
  border-radius: 15px;
  max-width: 70%;
}

/* AI */
.ai {
  align-self: flex-start;
  max-width: 100%;
  line-height: 1.6;
  opacity: 0;
  animation: fadeIn 0.3s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  gap: 10px;
  border-top: 1px solid #333;
}
input {
  flex: 1;
  padding: 10px;
  background: #111;
  color: white;
  border: 1px solid #333;
}
button {
  padding: 10px;
  background: white;
  color: black;
  border: none;
}
</style>
</head>

<body>

<div id="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <div id="chatList"></div>
</div>

<div id="toggleBtn">◀</div>

<div id="main">
  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Ask something...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

const API_KEY = "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";

let chats = {};
let currentChat = "General";
chats[currentChat] = [];

/* SAFE TOGGLE (EVENT LISTENER VERSION) */
document.getElementById("toggleBtn").addEventListener("click", () => {
  const sidebar = document.getElementById("sidebar");
  const main = document.getElementById("main");
  const btn = document.getElementById("toggleBtn");

  const hidden = sidebar.classList.toggle("hidden");

  main.classList.toggle("full", hidden);
  btn.classList.toggle("shifted", hidden);

  btn.innerText = hidden ? "▶" : "◀";
});

/* CHAT LIST */
function renderChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  Object.keys(chats).forEach(name => {
    const div = document.createElement("div");
    div.className = "chat-tab" + (name === currentChat ? " active" : "");
    div.textContent = name;
    div.onclick = () => {
      currentChat = name;
      renderChatList();
      renderMessages();
    };
    list.appendChild(div);
  });
}

/* MESSAGES */
function renderMessages() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  chats[currentChat].forEach(m => {
    const div = document.createElement("div");
    div.className = m.role === "user" ? "user" : "ai";
    div.textContent = m.content;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

/* NEW CHAT */
function newChat() {
  const name = "New Chat " + Object.keys(chats).length;
  chats[name] = [];
  currentChat = name;
  renderChatList();
  renderMessages();
}

/* SEND */
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  chats[currentChat].push({ role: "user", content: text });
  renderMessages();

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: chats[currentChat]
      })
    });

    const data = await res.json();

    const reply =
      data?.choices?.[0]?.message?.content ||
      "Something went wrong.";

    chats[currentChat].push({ role: "assistant", content: reply });

    renderMessages();

  } catch {
    chats[currentChat].push({
      role: "assistant",
      content: "Connection error."
    });

    renderMessages();
  }
}

renderChatList();
renderMessages();

</script>

</body>
</html>
