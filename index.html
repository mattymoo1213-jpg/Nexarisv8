<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ffcc;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

h1 {
  text-align: center;
  padding: 10px;
}

#output {
  flex: 1;
  padding: 15px;
  font-size: 20px;
  overflow-y: auto;
  white-space: pre-wrap;
}

.bar {
  display: flex;
  padding: 10px;
  gap: 5px;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
}

button {
  padding: 12px;
  background: #00ffcc;
  border: none;
}
</style>
</head>

<body>

<h1>NEXARIS</h1>

<div id="output">Ready.</div>

<div class="bar">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="ask()">Send</button>
  <button onclick="voice()">🎤</button>
</div>

<script>

// 🔑 ONLY PUT YOUR KEY HERE
const API_KEY = "";

function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}

function voice(){
  let r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  r.lang = "en-US";
  r.onresult = e => {
    document.getElementById("input").value = e.results[0][0].transcript;
    ask();
  };
  r.start();
}

function mathCheck(input){
  if (/^[0-9+\-*/(). ]+$/.test(input)){
    try { return eval(input).toString(); } catch { return null; }
  }
  return null;
}

async function getAI(prompt){
  try {
    let res = await fetch("https://api.sambanova.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          {
            role: "system",
            content: "You are Nexaris, a confident AI assistant. Always answer clearly and directly."
          },
          {
            role: "user",
            content: prompt
          }
        ]
      })
    });

    let data = await res.json();

    if (data.choices?.[0]?.message?.content){
      return data.choices[0].message.content;
    }

    console.log(data);
    return "AI error (check console).";

  } catch (e){
    return "Error connecting to AI.";
  }
}

async function ask(){
  let input = document.getElementById("input").value;
  let out = document.getElementById("output");

  if (!input) return;

  out.innerText = "Thinking...";

  let math = mathCheck(input);
  if (math){
    out.innerText = math;
    speak(math);
    return;
  }

  let response = await getAI(input);

  out.innerText = response;
  speak(response);
}

</script>

</body>
</html>
