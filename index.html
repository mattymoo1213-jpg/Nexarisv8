<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris Lite</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
position:fixed;
left:0;
top:0;
width:240px;
height:100%;
background:#111;
padding:10px;
box-sizing:border-box;
overflow-y:auto;
}

#main{
position:absolute;
left:240px;
right:0;
top:0;
bottom:0;
display:flex;
flex-direction:column;
}

/* CHAT */
#chat{
flex:1;
padding:10px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.user{
align-self:flex-end;
background:#444;
padding:10px;
border-radius:12px;
max-width:70%;
}

.ai{
align-self:flex-start;
background:#1b1b1b;
padding:10px;
border-radius:12px;
max-width:90%;
white-space:pre-wrap;
}

/* INPUT */
#bar{
display:flex;
padding:10px;
gap:8px;
border-top:1px solid #333;
}

#input{
flex:1;
padding:10px;
background:#111;
color:white;
border:1px solid #333;
border-radius:8px;
}

button{
background:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* EMOJI PANEL */
#emojiBar{
display:flex;
gap:5px;
padding:5px 10px;
flex-wrap:wrap;
}

.emojiBtn{
background:#222;
color:white;
padding:6px 8px;
border-radius:6px;
cursor:pointer;
border:1px solid #333;
}
</style>
</head>

<body>

<div id="sidebar">
<h3>Nexaris</h3>

<div id="emojiBar">
<button class="emojiBtn">😀</button>
<button class="emojiBtn">😂</button>
<button class="emojiBtn">🔥</button>
<button class="emojiBtn">⚡</button>
<button class="emojiBtn">🧠</button>
<button class="emojiBtn">👍</button>
<button class="emojiBtn">❤️</button>
</div>
</div>

<div id="main">

<div id="chat"></div>

<div id="bar">
<input id="input" placeholder="Message Nexaris...">
<button id="send">Send</button>
</div>

</div>

<script>

/* =====================
   KEYS
===================== */
const GROQ_KEY="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";
const OPENROUTER_KEY="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";
const GEMINI_KEY="AQ.Ab8RN6K4mtqX2uIuhUxj7Uo4k7WM9SyIOHb8JRbr6HxpgPjLyA";

/* =====================
   CHAT STORAGE
===================== */
let messages=[];

const chat=document.getElementById("chat");
const input=document.getElementById("input");

/* =====================
   RENDER
===================== */
function render(){
chat.innerHTML="";
messages.forEach(m=>{
let div=document.createElement("div");
div.className=m.role==="user"?"user":"ai";
div.textContent=m.content;
chat.appendChild(div);
});
chat.scrollTop=chat.scrollHeight;
}

/* =====================
   AI (GROQ)
===================== */
async function groq(msgs){
try{
let r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages:msgs
})
});
let d=await r.json();
return d?.choices?.[0]?.message?.content||null;
}catch{return null;}
}

/* =====================
   OPENROUTER
===================== */
async function openrouter(msgs){
try{
let r=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENROUTER_KEY
},
body:JSON.stringify({
model:"meta-llama/llama-3.1-8b-instruct",
messages:msgs
})
});
let d=await r.json();
return d?.choices?.[0]?.message?.content||null;
}catch{return null;}
}

/* =====================
   GEMINI
===================== */
async function gemini(msgs){
try{
let r=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:msgs.map(m=>({
role:m.role==="user"?"user":"model",
parts:[{text:m.content}]
}))
})
}
);
let d=await r.json();
return d?.candidates?.[0]?.content?.parts?.[0]?.text||null;
}catch{return null;}
}

/* =====================
   AI CHAIN
===================== */
async function askAI(msgs){

let r=await groq(msgs);
if(r) return r;

r=await openrouter(msgs);
if(r) return r;

r=await gemini(msgs);
if(r) return r;

return "AI failed.";
}

/* =====================
   SEND
===================== */
async function send(){

let text=input.value.trim();
if(!text) return;

messages.push({role:"user",content:text});
input.value="";
render();

messages.push({role:"assistant",content:"Thinking..."});
render();

let res=await askAI([
{role:"system",content:"You are Nexaris, a helpful AI."},
...messages
]);

messages.pop();

messages.push({role:"assistant",content:res});
render();
}

/* =====================
   EMOJI BUTTONS
===================== */
document.querySelectorAll(".emojiBtn").forEach(btn=>{
btn.onclick=()=>{
input.value+=btn.textContent;
input.focus();
};
});

/* =====================
   EVENTS
===================== */
document.getElementById("send").onclick=send;

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

render();

</script>

</body>
</html>
