<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris AI</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: Arial;
  color: #00ffcc;
  font-size: 22px;
}

body {
  display: flex;
  flex-direction: column;
}

h1 {
  text-align: center;
  font-size: 34px;
  padding: 15px;
  border-bottom: 1px solid #00ffcc33;
}

#output {
  flex: 1;
  padding: 20px;
  font-size: 26px;
  line-height: 1.6;
  overflow-y: auto;
}

.inputArea {
  display: flex;
  padding: 10px;
  gap: 8px;
}

input {
  flex: 1;
  padding: 16px;
  font-size: 20px;
}

button {
  padding: 16px;
  background: #00ffcc;
  border: none;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>NEXARIS</h1>

<div id="output">System ready.</div>

<div class="inputArea">
<input id="input" placeholder="Ask anything..." />
<button onclick="ask()">Send</button>
</div>

<script>
let userName = localStorage.getItem("nexaris_name");

// 🔊 Voice
function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  let voices = speechSynthesis.getVoices();

  let voice = voices.find(v => v.lang.startsWith("en"));
  if (voice) msg.voice = voice;

  msg.rate = 1;
  msg.pitch = 1;

  speechSynthesis.speak(msg);
}

// 🌐 Wikipedia lookup
async function wiki(query) {
  try {
    let url = "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(query);
    let res = await fetch(url);
    let data = await res.json();

    if (data.extract) {
      return data.extract.split(". ").slice(0, 2).join(". ") + ".";
    }
  } catch {}
  return null;
}

// 🧠 smart bird/explanation helper
function adviceMode(input) {
  let lower = input.toLowerCase();

  if (lower.includes("bird") && lower.includes("cage")) {
    return "Most small birds need a cage at least 18–24 inches wide, but bigger is always better so they can fly.";
  }

  if (lower.includes("how big should")) {
    return "It depends on the animal or object. Tell me what you're referring to and I’ll give a proper size.";
  }

  return null;
}

// ➕ math handler
function mathCheck(input) {
  if (/^[0-9+\-*/(). ]+$/.test(input)) {
    try {
      let result = Function("return " + input)();
      return "That equals " + result;
    } catch {
      return "I couldn’t calculate that.";
    }
  }
  return null;
}

// 🧠 main brain
async function ask() {
  let input = document.getElementById("input").value.trim();
  let output = document.getElementById("output");

  output.innerText = "Thinking...";

  let response = "";

  // 👤 memory
  if (input.toLowerCase().startsWith("my name is")) {
    userName = input.split("is")[1].trim();
    localStorage.setItem("nexaris_name", userName);
    response = "Got it. I’ll remember your name is " + userName;
  }

  // ➕ math first
  else if (mathCheck(input)) {
    response = mathCheck(input);
  }

  // 🧠 advice mode (bird cages etc.)
  else if (adviceMode(input)) {
    response = adviceMode(input);
  }

  // 🌐 Wikipedia fallback
  else {
    let wikiAnswer = await wiki(input);

    if (wikiAnswer) {
      response = wikiAnswer;
    } else {
      response = "I couldn’t find a clear answer. Try being more specific.";
    }
  }

  output.innerText = response;
  speak(response);
}
</script>

</body>
</html>
