<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#111;
padding:10px;
box-sizing:border-box;
overflow-y:auto;
transition:transform .3s ease;
z-index:20;
}

#sidebar.hidden{
transform:translateX(-100%);
}

/* MAIN */

#main{
position:absolute;
left:260px;
right:0;
top:0;
bottom:0;
display:flex;
flex-direction:column;
transition:left .3s ease;
}

#main.full{
left:0;
}

/* TOGGLE */

#toggleBtn{
position:fixed;
top:10px;
left:270px;
z-index:999;
background:white;
color:black;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
transition:left .3s ease;
}

/* SIDEBAR BUTTONS */

.sideBtn{
width:100%;
margin-top:8px;
padding:10px;
background:#222;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* SEARCH */

#search{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
color:white;
border:1px solid #333;
box-sizing:border-box;
}

/* CHAT LIST */

.chatItem{
background:#1b1b1b;
padding:8px;
margin-top:6px;
border-radius:6px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
}

.chatItem:hover{
background:#2b2b2b;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:3px 6px;
border-radius:4px;
cursor:pointer;
font-size:12px;
}

/* CHAT */

#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

/* USER */

.user{
align-self:flex-end;
background:#444;
padding:10px;
border-radius:14px;
max-width:75%;
word-wrap:break-word;
}

/* AI */

.ai{
align-self:flex-start;
white-space:pre-wrap;
max-width:100%;
word-wrap:break-word;
}

/* INPUT */

#inputArea{
display:flex;
align-items:center;
gap:8px;
padding:10px;
border-top:1px solid #333;
}

#plusBtn{
width:45px;
height:45px;
border-radius:50%;
background:#222;
color:white;
font-size:26px;
border:none;
cursor:pointer;
flex-shrink:0;
}

#input{
flex:1;
padding:12px;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
}

#sendBtn{
padding:12px;
background:white;
color:black;
border:none;
border-radius:10px;
cursor:pointer;
}

#sendBtn:disabled{
opacity:0.5;
cursor:not-allowed;
}

/* IMAGE */

#imagePreviewContainer{
padding-left:10px;
padding-bottom:10px;
}

#preview{
max-width:120px;
border-radius:12px;
display:none;
border:1px solid #333;
}

/* LOADING */

.loading{
opacity:0.7;
font-style:italic;
}

</style>
</head>

<body>

<div id="sidebar">

<button class="sideBtn" id="newChatBtn">+ New Chat</button>
<button class="sideBtn" id="modeBtn">Smart Mode 🧠</button>

<input id="search" placeholder="Search chats...">

<div id="chatList"></div>

</div>

<button id="toggleBtn">◀</button>

<div id="main">

<div id="chat"></div>

<div id="imagePreviewContainer">
<img id="preview">
</div>

<div id="inputArea">

<button id="plusBtn">＋</button>

<input id="imgInput" type="file" accept="image/*" hidden>

<input id="input" placeholder="Message Nexaris...">

<button id="sendBtn">Send</button>

</div>

</div>

<script>

/* =========================
   ORIGINAL STORAGE SYSTEM
========================= */

const savedChats = localStorage.getItem("nexaris_chats");
const savedCurrent = localStorage.getItem("nexaris_current");

let chats = savedChats ? JSON.parse(savedChats) : {};
let currentChat = savedCurrent || null;

if(Object.keys(chats).length === 0){
chats["New Chat"] = {messages:[],pinned:false};
currentChat = "New Chat";
}

/* =========================
   MODE + IMAGE
========================= */

let mode = "smart";
let lastImageBase64 = null;

/* =========================
   FIX: MULTI AI KEYS
========================= */

const GROQ_KEY = "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";
const OPENROUTER_KEY = "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";
const GEMINI_KEY = "AQ.Ab8RN6JfLt6rGZ0c0GpDOQGJA5FK_P-ZFn07cqAEpmWX_ID-aw";

/* =========================
   ELEMENTS
========================= */

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const toggleBtn = document.getElementById("toggleBtn");
const sidebar = document.getElementById("sidebar");
const main = document.getElementById("main");
const modeBtn = document.getElementById("modeBtn");
const chatList = document.getElementById("chatList");
const plusBtn = document.getElementById("plusBtn");
const imgInput = document.getElementById("imgInput");

/* =========================
   SAVE SYSTEM
========================= */

function saveChats(){
localStorage.setItem("nexaris_chats",JSON.stringify(chats));
localStorage.setItem("nexaris_current",currentChat);
}

/* =========================
   AI FIX (GROQ)
========================= */

async function callGroq(messages){
try{
const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + GROQ_KEY
},
body:JSON.stringify({
model:"llama-3.1-8b-instant",
messages
})
});

const data = await res.json();
return data?.choices?.[0]?.message?.content || null;
}catch{return null;}
}

/* =========================
   AI FIX (OPENROUTER)
========================= */

async function callOpenRouter(messages){
try{
const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + OPENROUTER_KEY
},
body:JSON.stringify({
model:"meta-llama/llama-3.1-8b-instruct",
messages
})
});

const data = await res.json();
return data?.choices?.[0]?.message?.content || null;
}catch{return null;}
}

/* =========================
   AI FIX (GEMINI)
========================= */

async function callGemini(messages){
try{
const res = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents: messages.map(m=>({
role:m.role==="user"?"user":"model",
parts:[{text:m.content}]
}))
})
}
);

const data = await res.json();
return data?.candidates?.[0]?.content?.parts?.[0]?.text || null;
}catch{return null;}
}

/* =========================
   FIXED FALLBACK CHAIN
========================= */

async function askAI(messages){

let reply = await callGroq(messages);
let source = "Groq";

if(!reply){
reply = await callOpenRouter(messages);
source = "OpenRouter";
}

if(!reply){
reply = await callGemini(messages);
source = "Gemini";
}

if(!reply){
return {
text:"⚠️ All AI systems failed.",
source:"Error"
};
}

return {
text:reply,
source
};

}

/* =========================
   RENDER SYSTEM
========================= */

function render(){
chat.innerHTML="";

for(const msg of chats[currentChat].messages){
const div=document.createElement("div");
div.className=msg.role==="user"?"user":"ai";

if(msg.loading) div.classList.add("loading");

div.textContent=msg.content;
chat.appendChild(div);
}

chat.scrollTop=chat.scrollHeight;
renderChatList();
}

/* =========================
   CHAT LIST
========================= */

function renderChatList(){
chatList.innerHTML="";

Object.keys(chats).forEach(name=>{
const div=document.createElement("div");
div.className="chatItem";

div.innerHTML=name;

div.onclick=()=>{
currentChat=name;
saveChats();
render();
};

const del=document.createElement("button");
del.textContent="X";
del.className="deleteBtn";

del.onclick=(e)=>{
e.stopPropagation();
delete chats[name];

if(Object.keys(chats).length===0){
chats["New Chat"]={messages:[],pinned:false};
currentChat="New Chat";
}

currentChat=Object.keys(chats)[0];
saveChats();
render();
};

div.appendChild(del);
chatList.appendChild(div);
});
}

/* =========================
   IMAGE UPLOAD
========================= */

plusBtn.onclick=()=>imgInput.click();

imgInput.onchange=(e)=>{
const file=e.target.files[0];
if(!file) return;

const reader=new FileReader();
reader.onload=()=>{
lastImageBase64=reader.result;
document.getElementById("preview").src=lastImageBase64;
document.getElementById("preview").style.display="block";
};
reader.readAsDataURL(file);
};

/* =========================
   SEND (FIXED ONLY PART)
========================= */

async function send(){

const text=input.value.trim();
if(!text && !lastImageBase64) return;

sendBtn.disabled=true;

input.value="";

chats[currentChat].messages.push({
role:"user",
content:text + (lastImageBase64 ? "\n[Image attached]" : "")
});

render();
saveChats();

/* loading */
chats[currentChat].messages.push({
role:"assistant",
content:"Nexaris is thinking... ⚡",
loading:true
});

render();

const systemPrompt =
mode==="smart"
? "You are Nexaris. Be helpful and smart."
: "Be short.";

const messages=[
{role:"system",content:systemPrompt},
...chats[currentChat].messages.filter(m=>!m.loading)
];

/* AI CALL (FIXED) */
const result = await askAI(messages);

/* remove loading */
chats[currentChat].messages =
chats[currentChat].messages.filter(m=>!m.loading);

/* push result */
chats[currentChat].messages.push({
role:"assistant",
content:"🧠 " + result.source + "\n\n" + result.text
});

saveChats();
render();

/* reset image */
lastImageBase64=null;
document.getElementById("preview").style.display="none";

sendBtn.disabled=false;
}

/* =========================
   EVENTS
========================= */

document.getElementById("sendBtn").onclick=send;

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

render();
renderChatList();

</script>

</body>
</html>
