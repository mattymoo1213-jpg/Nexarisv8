<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris AI</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: Arial;
  color: #00ffcc;
  font-size: 22px;
}

body {
  display: flex;
  flex-direction: column;
}

h1 {
  text-align: center;
  font-size: 34px;
  padding: 15px;
  border-bottom: 1px solid #00ffcc33;
}

#output {
  flex: 1;
  padding: 20px;
  font-size: 26px;
  line-height: 1.6;
  overflow-y: auto;
  white-space: pre-wrap;
}

.inputArea {
  display: flex;
  padding: 10px;
  gap: 6px;
  border-top: 1px solid #00ffcc33;
}

input {
  flex: 1;
  padding: 16px;
  font-size: 20px;
}

button {
  padding: 16px;
  background: #00ffcc;
  border: none;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>NEXARIS</h1>

<div id="output">System online. Tap 🎤 or type a question.</div>

<div class="inputArea">
<input id="input" placeholder="Ask or speak..." />
<button onclick="ask()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

<script>
let userName = localStorage.getItem("nexaris_name");

// 🔊 VOICE OUTPUT
function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  let voices = speechSynthesis.getVoices();

  let voice =
    voices.find(v => v.lang === "en-AU") ||
    voices.find(v => v.lang.startsWith("en"));

  if (voice) msg.voice = voice;

  msg.rate = 1;
  msg.pitch = 1;

  speechSynthesis.speak(msg);
}

// 🌐 WIKIPEDIA SEARCH
async function wiki(query) {
  try {
    let url = "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(query);
    let res = await fetch(url);
    let data = await res.json();

    if (data.extract) {
      return data.extract.split(". ").slice(0, 3).join(". ") + ".";
    }
  } catch {}
  return null;
}

// ➕ MATH ENGINE
function mathCheck(input) {
  input = input.toLowerCase();

  // sqrt
  if (input.includes("sqrt") || input.includes("√") || input.includes("square root")) {
    let num = input.replace(/sqrt|√|square root|of|\(|\)/g, "").trim();
    let result = Math.sqrt(Number(num));
    return "That equals " + result;
  }

  // power
  if (input.includes("^")) {
    let parts = input.split("^");
    let base = Number(parts[0].trim());
    let exp = Number(parts[1].trim());
    return "That equals " + Math.pow(base, exp);
  }

  // normal math
  if (/^[0-9+\-*/(). ]+$/.test(input)) {
    try {
      return "That equals " + Function("return " + input)();
    } catch {
      return "I couldn’t calculate that.";
    }
  }

  return null;
}

// 🐦 SIMPLE ADVICE MODE
function adviceCheck(input) {
  let lower = input.toLowerCase();

  if (lower.includes("bird") && lower.includes("cage")) {
    return "A good bird cage should be at least 18–24 inches wide, but larger is always better so birds can fully stretch and fly.";
  }

  if (lower.includes("how big should")) {
    return "It depends on what you're referring to. Tell me the object and I’ll give a proper size recommendation.";
  }

  return null;
}

// 🎤 VOICE INPUT
function startVoice() {
  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice input not supported on this device.");
    return;
  }

  let recognition = new SpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    let text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    ask();
  };

  recognition.start();
}

// 🧠 MAIN AI CORE
async function ask() {
  let input = document.getElementById("input").value.trim();
  let output = document.getElementById("output");

  output.innerText = "Thinking...";

  let response = "";

  // 👤 NAME MEMORY
  if (input.toLowerCase().startsWith("my name is")) {
    userName = input.split("is")[1].trim();
    localStorage.setItem("nexaris_name", userName);
    response = "Got it. I’ll remember your name is " + userName + ".";
  }

  // ➕ MATH FIRST
  else if (mathCheck(input)) {
    response = mathCheck(input);
  }

  // 🐦 ADVICE
  else if (adviceCheck(input)) {
    response = adviceCheck(input);
  }

  // 🌐 WIKIPEDIA + DEEP RESPONSE
  else {
    let wikiAnswer = await wiki(input);

    if (wikiAnswer) {
      response =
        "Here’s what I found:\n\n" +
        wikiAnswer +
        "\n\nIf you want, I can explain this further or simplify it.";
    } else {
      response =
        "I couldn’t find a direct answer.\n\nTry being more specific and I’ll explain it better.";
    }
  }

  output.innerText = response;
  speak(response);
}
</script>

</body>
</html>
