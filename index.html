<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 200px;
  height: 100%;
  background: #111;
  padding: 10px;
  transition: transform 0.3s ease;
  overflow-y: auto;
}

#sidebar.hidden {
  transform: translateX(-100%);
}

/* MAIN */
#main {
  position: absolute;
  left: 200px;
  right: 0;
  top: 0;
  bottom: 0;
  display: flex;
  flex-direction: column;
  transition: left 0.3s ease;
}

#main.full {
  left: 0;
}

/* TOGGLE */
#toggleBtn {
  position: fixed;
  top: 10px;
  left: 210px;
  background: white;
  color: black;
  padding: 5px 8px;
  border-radius: 5px;
  cursor: pointer;
  z-index: 999;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.user {
  align-self: flex-end;
  background: #444;
  padding: 10px;
  border-radius: 12px;
  max-width: 70%;
}

.ai {
  align-self: flex-start;
  max-width: 100%;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  border-top: 1px solid #333;
}

input {
  flex: 1;
  padding: 10px;
  background: #111;
  color: white;
  border: 1px solid #333;
}

button {
  padding: 10px;
  background: white;
  border: none;
  cursor: pointer;
}

/* MODE BUTTON */
#physicsBtn {
  margin-top: 10px;
  padding: 8px;
  background: #222;
  cursor: pointer;
  text-align: center;
  border-radius: 5px;
}
</style>
</head>

<body>

<div id="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <div id="physicsBtn">Physics Mode: OFF</div>
</div>

<div id="toggleBtn">◀</div>

<div id="main">
  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Ask something...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

const API_KEY = "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";

let physicsMode = false;

let chats = { General: [] };
let currentChat = "General";

/* TOGGLE SIDEBAR */
document.getElementById("toggleBtn").onclick = () => {
  const sidebar = document.getElementById("sidebar");
  const main = document.getElementById("main");

  sidebar.classList.toggle("hidden");
  main.classList.toggle("full");
};

/* PHYSICS MODE */
document.getElementById("physicsBtn").onclick = () => {
  physicsMode = !physicsMode;
  document.getElementById("physicsBtn").innerText =
    physicsMode ? "Physics Mode: ON 🧠" : "Physics Mode: OFF";
};

/* CHAT RENDER */
function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  chats[currentChat].forEach(m => {
    const div = document.createElement("div");
    div.className = m.role === "user" ? "user" : "ai";
    div.textContent = m.content;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

/* NEW CHAT */
function newChat() {
  const name = "Chat " + Object.keys(chats).length;
  chats[name] = [];
  currentChat = name;
  render();
}

/* SEND MESSAGE */
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  chats[currentChat].push({ role: "user", content: text });
  render();

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: "llama-3.1-8b-instant",
      messages: [
        {
          role: "system",
          content: physicsMode
            ? "You are Nexaris in PHYSICS MODE. You explain force, motion, energy, momentum, stress, and material strength for safe engineering and design improvement."
            : "You are Nexaris, a helpful AI assistant."
        },
        ...chats[currentChat]
      ]
    })
  });

  const data = await res.json();

  const reply =
    data?.choices?.[0]?.message?.content ||
    "Error getting response.";

  chats[currentChat].push({ role: "assistant", content: reply });

  render();
}

render();

</script>

</body>
</html>
