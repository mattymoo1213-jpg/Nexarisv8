<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris AI</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ffcc;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

h1 {
  text-align: center;
  padding: 10px;
}

#output {
  flex: 1;
  padding: 15px;
  font-size: 20px;
  overflow-y: auto;
  white-space: pre-wrap;
}

.bar {
  display: flex;
  padding: 10px;
  gap: 5px;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 18px;
}

button {
  padding: 12px;
  background: #00ffcc;
  border: none;
}
</style>
</head>

<body>

<h1>NEXARIS</h1>

<div id="output">Ready.</div>

<div class="bar">
  <input id="input" placeholder="Ask anything..." />
  <button onclick="ask()">Send</button>
  <button onclick="voice()">🎤</button>
</div>

<script>

// 🔑 PUT YOUR API KEY HERE ONLY
const API_KEY = "83489193-5f89-409c-9224-bf21bace64f2";


// 🔊 SPEAK
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}


// 🎤 VOICE
function voice(){
  let r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  r.lang = "en-US";

  r.onresult = e => {
    document.getElementById("input").value = e.results[0][0].transcript;
    ask();
  };

  r.start();
}


// ➕ MATH
function mathCheck(input){
  if (/^[0-9+\-*/(). ]+$/.test(input)){
    try {
      return eval(input).toString();
    } catch {
      return null;
    }
  }
  return null;
}


// 🤖 AI FUNCTION (FIXED + DEBUG READY)
async function getAI(prompt){
  try {

    let res = await fetch("https://api.sambanova.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "llama-3.1-8b-instant",
        messages: [
          {
            role: "system",
            content: "You are Nexaris, a confident AI assistant. Always answer directly and clearly. Never say you are unsure."
          },
          {
            role: "user",
            content: prompt
          }
        ]
      })
    });

    let data = await res.json();

    console.log("STATUS:", res.status);
    console.log("RAW RESPONSE:", data);

    if (res.ok && data.choices?.[0]?.message?.content){
      return data.choices[0].message.content;
    }

    return "AI error (check console).";

  } catch (e){
    console.log("FETCH ERROR:", e);
    return "Error connecting to AI.";
  }
}


// 🧠 MAIN FLOW
async function ask(){
  let input = document.getElementById("input").value.trim();
  let out = document.getElementById("output");

  if (!input) return;

  out.innerText = "Thinking...";

  // math first
  let m = mathCheck(input);
  if (m){
    out.innerText = m;
    speak(m);
    return;
  }

  // AI
  let response = await getAI(input);

  out.innerText = response;
  speak(response);
}

</script>

</body>
</html>
