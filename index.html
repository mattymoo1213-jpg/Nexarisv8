<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  font-family: Arial;
  color: #00ffcc;
  font-size: 22px;
}

body {
  display: flex;
  flex-direction: column;
}

h1 {
  margin: 0;
  padding: 20px;
  text-align: center;
  font-size: 36px;
}

#output {
  flex: 1;
  padding: 20px;
  font-size: 24px;
  line-height: 1.6;
  overflow-y: auto;
}

.inputArea {
  display: flex;
  padding: 10px;
}

input {
  flex: 1;
  padding: 18px;
  font-size: 22px;
}

button {
  padding: 18px;
  font-size: 20px;
  background: #00ffcc;
  border: none;
}
</style>
</head>

<body>

<h1>NEXARIS</h1>
<div id="output">System ready.</div>

<div class="inputArea">
<input id="input" placeholder="Ask anything..." />
<button onclick="ask()">Send</button>
</div>

<script>
let userName = localStorage.getItem("nexaris_name");

// 🎤 Voice
function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  let voices = speechSynthesis.getVoices();

  let preferred =
    voices.find(v => v.lang === "en-AU") ||
    voices.find(v => v.lang.startsWith("en"));

  if (preferred) msg.voice = preferred;

  msg.rate = 1;
  msg.pitch = 1;

  speechSynthesis.speak(msg);
}

// 🧠 Smart answering system
async function ask() {
  let input = document.getElementById("input").value.trim();
  let output = document.getElementById("output");
  let lower = input.toLowerCase();

  output.innerText = "Thinking...";

  let response = "";

  // NAME MEMORY
  if (lower.startsWith("my name is")) {
    userName = input.split("is")[1].trim();
    localStorage.setItem("nexaris_name", userName);
    response = "Noted. Your name is " + userName + ".";
  }

  // SIMPLE RESPONSES
  else if (lower.includes("hello")) {
    response = userName ? "Hello " + userName + "." : "Hello.";
  }

  else if (lower.includes("who are you")) {
    response = "I am Nexaris, an assistant designed to answer questions and provide information.";
  }

  else {
    // 🌐 REAL ANSWER FETCH (Wikipedia)
    try {
      let url = "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(input);
      let res = await fetch(url);
      let data = await res.json();

      if (data.extract) {
        // ✨ clean shorter response
        response = data.extract.split(". ").slice(0, 2).join(". ") + ".";
      } else {
        response = "No clear answer found. Try rephrasing.";
      }

    } catch {
      response = "I could not retrieve information.";
    }
  }

  output.innerText = response;
  speak(response);
}
</script>

</body>
</html>
