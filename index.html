<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
position:fixed;
top:0;
left:0;
width:220px;
height:100%;
background:#111;
padding:10px;
box-sizing:border-box;
transition:transform .3s ease;
overflow-y:auto;
z-index:10;
}

#sidebar.hidden{
transform:translateX(-100%);
}

/* MAIN */

#main{
position:absolute;
left:220px;
right:0;
top:0;
bottom:0;
display:flex;
flex-direction:column;
transition:left .3s ease;
}

#main.full{
left:0;
}

/* TOGGLE BUTTON */

#toggleBtn{
position:fixed;
top:10px;
left:230px;
z-index:999;
background:white;
color:black;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
transition:left .3s ease;
}

/* CHAT */

#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

/* USER MESSAGE */

.user{
align-self:flex-end;
background:#444;
padding:10px;
border-radius:12px;
max-width:70%;
word-wrap:break-word;
}

/* AI MESSAGE */

.ai{
align-self:flex-start;
white-space:pre-wrap;
max-width:100%;
word-wrap:break-word;
}

/* INPUT AREA */

#inputArea{
display:flex;
gap:5px;
padding:10px;
border-top:1px solid #333;
}

/* INPUT */

#input{
flex:1;
padding:10px;
background:#111;
color:white;
border:1px solid #333;
}

/* BUTTONS */

button{
padding:10px;
border:none;
cursor:pointer;
background:white;
color:black;
border-radius:5px;
}

/* SIDEBAR BUTTONS */

.sideBtn{
width:100%;
margin-top:8px;
background:#222;
color:white;
}

/* IMAGE */

#preview{
width:100%;
margin-top:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div id="sidebar">

<button class="sideBtn" onclick="newChat()">
+ New Chat
</button>

<button id="modeBtn" class="sideBtn">
Smart Mode 🧠
</button>

<input
type="file"
id="imgInput"
accept="image/*"
class="sideBtn"
/>

<img id="preview">

</div>

<!-- TOGGLE -->

<button id="toggleBtn">◀</button>

<!-- MAIN -->

<div id="main">

<div id="chat"></div>

<div id="inputArea">

<input
id="input"
placeholder="Message Nexaris..."
/>

<button id="sendBtn">
Send
</button>

</div>

</div>

<script>

/* API KEY */

const API_KEY = "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";

/* MODE */

let mode = "smart";

/* IMAGE */

let lastImageBase64 = null;

/* CHATS */

let chats = {
General:[]
};

let currentChat = "General";

/* ELEMENTS */

const chat =
document.getElementById("chat");

const input =
document.getElementById("input");

const sendBtn =
document.getElementById("sendBtn");

const toggleBtn =
document.getElementById("toggleBtn");

const sidebar =
document.getElementById("sidebar");

const main =
document.getElementById("main");

const modeBtn =
document.getElementById("modeBtn");

/* RENDER */

function render(){

chat.innerHTML = "";

chats[currentChat].forEach(msg=>{

const div =
document.createElement("div");

div.className =
msg.role === "user"
? "user"
: "ai";

div.textContent =
msg.content;

chat.appendChild(div);

});

chat.scrollTop =
chat.scrollHeight;

}

/* NEW CHAT */

function newChat(){

const name =
"Chat " +
Object.keys(chats).length;

chats[name] = [];

currentChat = name;

render();

}

/* TOGGLE SIDEBAR */

toggleBtn.addEventListener(
"click",
()=>{

const hidden =
sidebar.classList.toggle("hidden");

main.classList.toggle(
"full",
hidden
);

toggleBtn.innerText =
hidden ? "▶" : "◀";

toggleBtn.style.left =
hidden
? "10px"
: "230px";

}
);

/* SMART / FAST */

modeBtn.addEventListener(
"click",
()=>{

mode =
mode === "smart"
? "fast"
: "smart";

modeBtn.innerText =
mode === "smart"
? "Smart Mode 🧠"
: "Fast Mode ⚡";

}
);

/* IMAGE */

document
.getElementById("imgInput")
.addEventListener(
"change",
(e)=>{

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload = ()=>{

lastImageBase64 =
reader.result;

const preview =
document.getElementById("preview");

preview.src =
lastImageBase64;

preview.style.display =
"block";

};

reader.readAsDataURL(file);

}
);

/* SEND FUNCTION */

async function send(){

const text =
input.value.trim();

if(
!text &&
!lastImageBase64
) return;

input.value = "";

let userMessage = text;

if(lastImageBase64){

userMessage +=
"\n[User uploaded image for analysis]";

}

chats[currentChat].push({
role:"user",
content:userMessage
});

render();

const systemPrompt =
mode === "smart"

? `You are Nexaris.

You are intelligent, friendly,
engaging, and helpful.

You can:
- answer questions
- explain science and math
- help with coding
- identify objects or fossils from images

Use emojis occasionally.`

: `You are Nexaris.

Respond quickly and concisely.`;

const messages = [

{
role:"system",
content:systemPrompt
},

...chats[currentChat]

];

if(lastImageBase64){

messages.push({

role:"user",

content:
"Image data: " +
lastImageBase64

});

}

try{

const response =
await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":
"Bearer " + API_KEY
},

body:JSON.stringify({

model:
"llama-3.1-8b-instant",

messages

})

}
);

const data =
await response.json();

console.log(data);

const reply =

data?.choices?.[0]
?.message?.content

||

data?.error?.message

||

"AI failed to respond.";

chats[currentChat].push({
role:"assistant",
content:reply
});

render();

}catch(err){

console.error(err);

chats[currentChat].push({
role:"assistant",
content:"Connection error."
});

render();

}

lastImageBase64 = null;

document.getElementById(
"preview"
).style.display = "none";

}

/* SEND BUTTON */

sendBtn.addEventListener(
"click",
send
);

/* ENTER KEY */

input.addEventListener(
"keydown",
(e)=>{

if(e.key === "Enter"){

send();

}

}
);

render();

</script>

</body>
</html>
