<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris AI</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: Arial;
  color: #00ffcc;
}

body {
  display: flex;
  flex-direction: column;
}

h1 {
  text-align: center;
  padding: 15px;
}

#output {
  flex: 1;
  padding: 20px;
  font-size: 22px;
  white-space: pre-wrap;
  overflow-y: auto;
}

.inputArea {
  display: flex;
  gap: 5px;
  padding: 10px;
}

input {
  flex: 1;
  padding: 15px;
  font-size: 18px;
}

button {
  padding: 15px;
  background: #00ffcc;
  border: none;
}
</style>
</head>

<body>

<h1>NEXARIS AI</h1>

<div id="output">Ready. Ask me anything.</div>

<div class="inputArea">
<input id="input" placeholder="Ask anything..." />
<button onclick="ask()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

<script>

// 🔑 ============================
// 🔑41962597-047f-4d67-9065-11fafa91403a
// 🔑 ============================
const API_KEY = 41962597-047f-4d67-9065-11fafa91403a;


// 🔊 SPEAK
function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}


// 🎤 VOICE INPUT
function startVoice() {
  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice not supported");
    return;
  }

  let recognition = new SpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    let text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    ask();
  };

  recognition.start();
}


// ➕ SIMPLE MATH
function mathCheck(input) {
  if (/^[0-9+\-*/(). ]+$/.test(input)) {
    try {
      return "That equals " + Function("return " + input)();
    } catch {
      return null;
    }
  }

  if (input.toLowerCase().includes("sqrt")) {
    let num = input.replace(/[^0-9.]/g, "");
    return "That equals " + Math.sqrt(Number(num));
  }

  return null;
}


// 🌐 WIKIPEDIA BACKUP
async function getWiki(topic) {
  try {
    let res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`);
    let data = await res.json();

    if (data.extract) {
      return data.extract;
    } else {
      return null;
    }
  } catch {
    return null;
  }
}


// 🤖 AI (PRIMARY BRAIN)
async function getAI(prompt) {
  try {
    let res = await fetch("https://api.sambanova.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "Meta-Llama-3.1-8B-Instruct",
        messages: [
          {
            role: "system",
            content: "You are Nexaris, a confident and intelligent AI assistant. Always give clear, direct answers. Do NOT say 'I'm not sure' unless absolutely necessary. If you truly do not know something, respond ONLY with: UNKNOWN"
          },
          {
            role: "user",
            content: prompt
          }
        ]
      })
    });

    let data = await res.json();

    if (data.choices && data.choices.length > 0) {
      return data.choices[0].message.content;
    } else {
      return "Error getting response.";
    }

  } catch {
    return "Error connecting to AI.";
  }
}


// 🧠 MAIN SYSTEM
async function ask() {
  let input = document.getElementById("input").value.trim();
  let output = document.getElementById("output");

  if (!input) return;

  output.innerText = "Thinking...";

  // ➕ math first
  let math = mathCheck(input);
  if (math) {
    output.innerText = math;
    speak(math);
    return;
  }

  // 🤖 AI FIRST
  let aiResponse = await getAI(input);

  // 🌐 If AI doesn't know → Wikipedia
  if (aiResponse === "UNKNOWN") {
    let wiki = await getWiki(input);

    if (wiki) {
      output.innerText = wiki;
      speak(wiki);
    } else {
      let fallback = "I couldn't find a clear answer, but try asking in a different way.";
      output.innerText = fallback;
      speak(fallback);
    }

    return;
  }

  // 🧠 Normal AI response
  output.innerText = aiResponse;
  speak(aiResponse);
}

</script>

</body>
</html>
