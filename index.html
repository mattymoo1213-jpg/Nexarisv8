<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris AI</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: Arial;
  color: #00ffcc;
}

body {
  display: flex;
  flex-direction: column;
}

h1 {
  text-align: center;
  padding: 15px;
}

#output {
  flex: 1;
  padding: 20px;
  font-size: 22px;
  white-space: pre-wrap;
  overflow-y: auto;
}

.inputArea {
  display: flex;
  gap: 5px;
  padding: 10px;
}

input {
  flex: 1;
  padding: 15px;
  font-size: 18px;
}

button {
  padding: 15px;
  background: #00ffcc;
  border: none;
}
</style>
</head>

<body>

<h1>NEXARIS AI</h1>

<div id="output">Ready. Ask me anything.</div>

<div class="inputArea">
<input id="input" placeholder="Ask anything..." />
<button onclick="ask()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

<script>

// 🔑 ============================
// 🔑 366b5567-edba-407a-8ac4-6a82f1b076f0
// 🔑 ============================
const API_KEY = "PASTE_YOUR_API_KEY_HERE";


// 🔊 SPEAK
function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}


// 🎤 VOICE INPUT
function startVoice() {
  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Voice not supported");
    return;
  }

  let recognition = new SpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    let text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
    ask();
  };

  recognition.start();
}


// ➕ SIMPLE MATH
function mathCheck(input) {
  if (/^[0-9+\-*/(). ]+$/.test(input)) {
    try {
      return "That equals " + Function("return " + input)();
    } catch {
      return null;
    }
  }

  if (input.toLowerCase().includes("sqrt")) {
    let num = input.replace(/[^0-9.]/g, "");
    return "That equals " + Math.sqrt(Number(num));
  }

  return null;
}


// 🤖 AI FUNCTION (SAMBANOVA)
async function getAI(prompt) {
  try {
    let res = await fetch("https://api.sambanova.ai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "Meta-Llama-3.1-8B-Instruct",
        messages: [
          {
            role: "system",
            content: "You are Nexaris, a helpful AI that talks naturally like a real assistant. Be clear, friendly, and actually answer the question."
          },
          {
            role: "user",
            content: prompt
          }
        ]
      })
    });

    let data = await res.json();
    return data.choices[0].message.content;

  } catch (err) {
    return "Error connecting to AI.";
  }
}


// 🧠 MAIN FUNCTION
async function ask() {
  let input = document.getElementById("input").value.trim();
  let output = document.getElementById("output");

  if (!input) return;

  output.innerText = "Thinking...";

  // ➕ math first
  let math = mathCheck(input);
  if (math) {
    output.innerText = math;
    speak(math);
    return;
  }

  // 🤖 AI
  let response = await getAI(input);

  output.innerText = response;
  speak(response);
}

</script>

</body>
</html>
