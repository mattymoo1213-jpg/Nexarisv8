<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexaris</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  font-family: Arial;
  color: #00ffcc;
  font-size: 22px;
}

body {
  display: flex;
  flex-direction: column;
}

h1 {
  text-align: center;
  font-size: 36px;
  padding: 15px;
  border-bottom: 1px solid #00ffcc33;
}

#output {
  flex: 1;
  padding: 20px;
  font-size: 26px;
  line-height: 1.6;
  overflow-y: auto;
}

.inputArea {
  display: flex;
  padding: 10px;
  border-top: 1px solid #00ffcc33;
}

input {
  flex: 1;
  padding: 18px;
  font-size: 22px;
  border: none;
  outline: none;
}

button {
  padding: 18px 22px;
  font-size: 20px;
  background: #00ffcc;
  border: none;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>NEXARIS</h1>

<div id="output">System ready.</div>

<div class="inputArea">
<input id="input" placeholder="Ask anything..." />
<button onclick="ask()">Send</button>
</div>

<script>
let userName = localStorage.getItem("nexaris_name");

// 🎤 Voice system
function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);

  let voices = speechSynthesis.getVoices();

  let voice =
    voices.find(v => v.lang.startsWith("en"));

  if (voice) msg.voice = voice;

  msg.rate = 1;
  msg.pitch = 1;

  speechSynthesis.speak(msg);
}

// 🌐 Wikipedia fetch (main brain)
async function wiki(query) {
  try {
    let url = "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(query);
    let res = await fetch(url);
    let data = await res.json();

    if (data.extract) {
      return data.extract.split(". ").slice(0, 2).join(". ") + ".";
    }
  } catch {}
  return null;
}

// 🧠 Core AI logic
async function ask() {
  let input = document.getElementById("input").value.trim();
  let output = document.getElementById("output");
  let lower = input.toLowerCase();

  output.innerText = "Thinking...";

  let response = "";

  // 👤 memory
  if (lower.startsWith("my name is")) {
    userName = input.split("is")[1].trim();
    localStorage.setItem("nexaris_name", userName);
    response = "Got it. I’ll remember your name is " + userName + ".";
  }

  // 👋 greeting
  else if (lower.includes("hello") || lower.includes("hi")) {
    response = userName ? "Hello " + userName + "." : "Hello.";
  }

  // ⏰ time
  else if (lower.includes("time")) {
    response = "It is " + new Date().toLocaleTimeString() + ".";
  }

  // 🌐 wiki answers
  else {
    let wikiAnswer = await wiki(input);

    if (wikiAnswer) {
      response = wikiAnswer;
    } else {
      response = "I don’t have a direct answer for that. Try being more specific.";
    }
  }

  output.innerText = response;
  speak(response);
}
</script>

</body>
</html>
